  <script>
    // Carica gli script in ordine, sempre freschi (evita cache stantia in sviluppo)
    (function () {
      var files = ['data.js', 'teaching.js', 'percorso.js', 'sapienziali.js', 'genealogia.js', 'domande.js', 'domande-extra.js', 'profeti.js', 'diffusione-capitali.js', 'studio/studio-data.js', 'studio-gesu-extra.js', 'misteri.js', 'versetti.js', 'app.js'];
      var v = Date.now();
      (function next(i) {
        if (i >= files.length) return;
        var s = document.createElement('script');
        s.src = files[i] + '?v=' + v;
        s.onload = function () { next(i + 1); };
        document.body.appendChild(s);
      })(0);
    })();
  </script>
